name: release

# Fully automatic npm releases via npm trusted publishing (OIDC).
#
# Trigger: any push to main that touches package.json. The job compares the
# manifest version against the npm registry; if the version is already
# published it skips the npm publish step. Tag/release finalization is
# idempotent and INDEPENDENT of npm publication status, so a rerun after a
# successful publish but a failed tag/release still repairs them rather than
# exiting green as "already on the registry". A version bump commit is the
# release intent: it publishes to npm (with provenance), tags the commit
# vX.Y.Z, and creates a GitHub Release.
#
# Auth: no tokens. npmjs.com is configured to trust this exact workflow file
# in this repository (package Settings -> Trusted Publisher). Requires the
# id-token: write permission below and npm >= 11.5.1 on the runner.

on:
  push:
    branches: [main]
    paths: ["package.json"]
  workflow_dispatch: {}

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # push the release tag + create the GitHub Release
  id-token: write # OIDC token for npm trusted publishing + provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm supports trusted publishing (>= 11.5.1)
        run: npm install -g npm@latest && npm --version

      - name: Detect unpublished version
        id: version
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          # npm publication status drives ONLY the publish step. Tag/release
          # finalization runs unconditionally below so a rerun after a
          # successful publish but a failed tag/release still repairs them
          # instead of exiting green as "already on the registry".
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice::$NAME@$VERSION is already on the registry - publish will be skipped."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$NAME@$VERSION is unpublished - releasing."
          fi

      - uses: oven-sh/setup-bun@v2
        if: steps.version.outputs.publish == 'true'

      - name: Install dependencies (repo-canonical package manager)
        if: steps.version.outputs.publish == 'true'
        run: |
          if [ -f bun.lock ]; then
            bun install --frozen-lockfile
          else
            npm ci
          fi

      - name: Run no-token release gate (canonical contract, same as CI)
        if: steps.version.outputs.publish == 'true'
        run: npm run release:no-token

      - name: Publish to npm (trusted publishing; provenance is automatic)
        if: steps.version.outputs.publish == 'true'
        run: npm publish

      - name: Tag and create GitHub Release
        # ALWAYS run, independent of whether npm already has the version, so a
        # rerun after a successful publish but a failed tag/release finalizes
        # the missing tag/release instead of skipping as "already published".
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          # Ensure the version tag exists (no-op if already present).
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::notice::tag $TAG already exists - nothing to push."
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "::notice::created and pushed tag $TAG."
          fi
          # Ensure the GitHub Release exists (no-op if already present).
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::notice::release $TAG already exists - nothing to create."
          else
            gh release create "$TAG" --title "$TAG" --generate-notes
            echo "::notice::created release $TAG."
          fi
